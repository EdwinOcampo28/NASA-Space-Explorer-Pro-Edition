<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NASA | El universo a 1 click</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="stars"></canvas>

<nav class="navbar">
<div class="nav-left logo-nasa">NASA</div>
<div class="nav-center logo-sub">El universo a 1 click</div>
  <div class="nav-right">
    <button class="btn btn-primary" onclick="showFavorites()">⭐ Favoritos</button>
  </div>
</nav>

<section class="hero">
  <h2>Descubre el Cosmos</h2>
  <p>Explora la Imagen Astronómica del Día</p>
</section>

<div class="controls">
  <input type="date" id="start">
  <input type="date" id="end">
  <input type="text" id="searchInput" placeholder="🔎 Buscar por título...">
  <button class="btn btn-primary" onclick="loadRange()">🔍 Buscar Rango</button>
  <button class="btn btn-secondary" onclick="loadToday()">📅 Hoy</button>
</div>

<div id="statusContainer"></div>
<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>

    <div class="modal-actions">
      <button id="favoriteBtn" class="btn btn-primary">⭐ Agregar a Favoritos</button>
      <a id="downloadBtn" target="_blank">
        <button class="btn btn-primary">⬇ Descargar</button>
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
